<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OA 综合管理平台 - 江能集团</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-blue-100 rounded-xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-building text-3xl text-blue-600"></i>
            </div>
            <h1 className="text-2xl font-bold text-gray-900">OA 综合管理平台</h1>
            <p className="text-gray-500 mt-2">江能集团员工办公系统</p>
        </div>

        <div id="error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm"></div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">员工账号</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input
                        type="text"
                        id="username"
                        class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                        placeholder="请输入员工账号"
                        required
                    />
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input
                        type="password"
                        id="password"
                        class="w-full pl-10 pr-12 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                        placeholder="请输入密码"
                        required
                    />
                    <button
                        type="button"
                        id="togglePassword"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
                    >
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center">
                    <input type="checkbox" class="mr-2 rounded border-gray-300">
                    <span class="text-gray-600">记住我</span>
                </label>
                <a href="#" class="text-blue-600 hover:text-blue-700">忘记密码？</a>
            </div>

            <button
                type="submit"
                id="submitBtn"
                class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition-all hover:shadow-lg flex items-center justify-center"
            >
                <span id="btnText">登录</span>
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            <p>员工账号: employee001</p>
            <p>默认密码: 123456</p>
        </div>

        <div class="mt-6 pt-6 border-t text-center">
            <a href="/admin-system/login/" class="text-sm text-gray-500 hover:text-blue-600">
                <i class="fas fa-cog mr-1"></i>网站后台管理入口
            </a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            const btnText = document.getElementById('btnText');
            
            btnText.textContent = '登录中...';
            
            // OA 系统员工登录验证
            if (username === 'employee001' && password === '123456') {
                localStorage.setItem('oa_token', 'oa_token_' + Date.now());
                localStorage.setItem('oa_user', JSON.stringify({
                    name: '张三',
                    role: '员工',
                    department: '业务部'
                }));
                window.location.href = '/oa/dashboard/';
            } else {
                errorDiv.textContent = '员工账号或密码错误';
                errorDiv.classList.remove('hidden');
                btnText.textContent = '登录';
            }
        });

        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    </script>
</body>
</html>
