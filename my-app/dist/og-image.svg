  <!-- Main title -->
  <text x="600" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">江能集团</text>
  
  <!-- Subtitle -->
  <text x="600" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif" font-size="36" fill="#94a3b8" text-anchor="middle">清洁能源，绿色未来</text>
  
  <!-- English subtitle -->
