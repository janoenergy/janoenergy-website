      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="200" fill="#10b981" opacity="0.1"/>
  <circle cx="1100" cy="530" r="250" fill="#0d9488" opacity="0.1"/>
  
  <!-- Logo icon -->
  <g transform="translate(540, 180)">
    <rect width="120" height="120" rx="24" fill="url(#accent-gradient)"/>
    <path d="M60 24L36 60H54L42 96L84 54H60L72 24H60Z" fill="white"/>
