name: Health Check

on:
  schedule:
    # 每 5 分钟检查一次
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check website availability
      uses: jtalk/url-health-check-action@v3
      with:
        url: https://www.janoenergy.com
        follow-redirect: true
        max-attempts: 3
        retry-delay: 5s
        retry-all: true
    
    - name: Check API availability
      uses: jtalk/url-health-check-action@v3
      with:
        url: https://api.janoenergy.com/api/projects
        follow-redirect: true
        max-attempts: 3
        retry-delay: 5s
        retry-all: true
    
    - name: Send email on failure
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.exmail.qq.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: '🚨 江能集团网站异常告警'
        to: lihua@janoenergy.cn
        from: 网站监控系统 <monitor@janoenergy.cn>
        body: |
          网站或 API 访问异常！
          
          • 网站: https://www.janoenergy.com
          • API: https://api.janoenergy.com
          • 检查时间: ${{ github.event.schedule }}
          • 工作流: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          请立即检查网站状态！
