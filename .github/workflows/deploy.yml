name: Deploy to Cloudflare

on:
  push:
    branches: [ main, master ]
    paths:
      - 'janoenergy-website/my-app/**'
      - 'janoenergy-website/worker/**'
      - '.github/workflows/deploy.yml'

  # 允许手动触发
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 部署前端到 Pages
  deploy-frontend:
    runs-on: ubuntu-latest
    name: Deploy Frontend
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: janoenergy-website/my-app/package-lock.json
    
    - name: Install dependencies
      working-directory: ./janoenergy-website/my-app
      run: npm ci
    
    - name: Build
      working-directory: ./janoenergy-website/my-app
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: https://api.janoenergy.com
    
    - name: Deploy to Cloudflare Pages
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: pages deploy dist --project-name=janoenergy-website --commit-dirty=true
        workingDirectory: janoenergy-website/my-app

  # 部署后端 Worker
  deploy-worker:
    runs-on: ubuntu-latest
    name: Deploy Worker
    # 只有 worker 目录有变更时才部署
    if: |
      contains(github.event.head_commit.modified, 'janoenergy-website/worker/') ||
      contains(github.event.head_commit.added, 'janoenergy-website/worker/') ||
      github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: janoenergy-website/worker/package-lock.json
    
    - name: Install dependencies
      working-directory: ./janoenergy-website/worker
      run: npm ci
    
    - name: Deploy Worker
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: deploy
        workingDirectory: janoenergy-website/worker

  # 发送部署通知
  notify:
    runs-on: ubuntu-latest
    name: Notify
    needs: [deploy-frontend, deploy-worker]
    if: always()
    
    steps:
    - name: Check deployment status
      run: |
        if [ "${{ needs.deploy-frontend.result }}" == "success" ] && [ "${{ needs.deploy-worker.result }}" == "success" ]; then
          echo "✅ 部署成功"
        elif [ "${{ needs.deploy-frontend.result }}" == "success" ]; then
          echo "⚠️ 前端部署成功，Worker 未变更或失败"
        elif [ "${{ needs.deploy-worker.result }}" == "success" ]; then
          echo "⚠️ Worker 部署成功，前端未变更或失败"
        else
          echo "❌ 部署失败"
          exit 1
        fi
